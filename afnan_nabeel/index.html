<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>متجر منتجات DXN</title>
  <!-- 🌟 1. إظهار الأيقونة فوراً أثناء تحميل الصفحة الأولي وقبل بدء الفيتش -->
  <link rel="icon" type="image/jpeg" href="../Tbweb.jpg">
  <script>
    // 1️⃣ معلومات العضوة أفنان
    const memberId = "830183051"; 
    const memberName = "BLAL JAMAL JASEEM"; 
    // نثبت المعرف على الـ window مباشرة علمود ملفك الرئيسي يشوفه تلقائياً بدون استبدال أسطر معقدة
    window.memberKey = "afnan_nabeel"; 

    // 2️⃣ جلب ملفك الرئيسي وتعديله ديناميكياً قبل العرض
    fetch('../index.html')
      .then(response => response.text())
      .then(html => {
        // الخروج برة المجلد لسحب الصور والملفات المشتركة
        let updatedHtml = html.replace('<head>', '<head><base href="../">');
        
        // تبديل رقم العضوية والاسم الخاص ببلال إلى معلومات أفنان فوراً بكرت التخفيض
        updatedHtml = updatedHtml.replace('828119655', memberId);
        updatedHtml = updatedHtml.replace('BLAL JAMAL JASEEM', memberName);

        // توجيه المتصفح للمانيفست الخاص بالعضوة لتثبيت الـ PWA بشكل صحيح باسمها
        updatedHtml = updatedHtml.replace('href="manifest.json"', 'href="afnan_nabeel/manifest.json"');
        
        // عرض الصفحة كاملة بنظافة وبدون مشاكل
        document.open();
        document.write(updatedHtml);
        document.close();
        
        // 🌟 2. التصحيح البرمجي: نكتب اسم الصورة مباشرة لأن وسم base متكفل بالرجوع خطوة ليبرة
        let favicon = document.createElement('link');
        favicon.rel = 'icon'; 
        favicon.type = 'image/jpeg'; 
        favicon.href = 'Tbweb.jpg'; 
        document.getElementsByTagName('head')[0].appendChild(favicon);
      });
  </script>
</head>
<body>
</body>
</html>
